<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AgentMesh Intelligence Hub</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../styles/input.css">
</head>
<body class="bg-background text-on-background selection:bg-primary-container selection:text-on-primary-fixed overflow-hidden">

  <!-- Load components -->
  <div id="header-container"></div>
  <div id="sidebar-container"></div>
  <div id="footer-container"></div>

  <!-- Main content (page-specific) -->
  <main id="main-content" class="ml-64 mt-16 pb-12 min-h-screen">
    <!-- Page content will be loaded here -->
  </main>

  <!-- API and Utils Scripts -->
  <script src="../js/utils.js"></script>
  <script src="../js/api.js"></script>

  <!-- Component Loader -->
  <script>
    /**
     * Load HTML components into containers
     */
    async function loadComponent(containerId, componentPath) {
      try {
        const response = await fetch(componentPath);
        const html = await response.text();
        document.getElementById(containerId).innerHTML = html;
      } catch (error) {
        console.error(`Failed to load component ${componentPath}:`, error);
      }
    }

    // Load all components on page load
    document.addEventListener('DOMContentLoaded', async () => {
      await loadComponent('header-container', '../components/header.html');
      await loadComponent('sidebar-container', '../components/sidebar.html');
      await loadComponent('footer-container', '../components/footer.html');
    });

    /**
     * Apply Tailwind config
     */
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "outline-variant": "#d1c6ab",
            "surface-tint": "#735c00",
            "on-tertiary-fixed": "#1b1b25",
            "inverse-surface": "#353028",
            "surface-container": "#f7ece1",
            "background": "#fff8f3",
            "on-primary-container": "#6c5700",
            "secondary-container": "#e9ded3",
            "surface-container-high": "#f1e6db",
            "on-primary-fixed-variant": "#574500",
            "primary-fixed-dim": "#eec200",
            "on-secondary-fixed": "#201b14",
            "tertiary-fixed": "#e3e1f0",
            "inverse-primary": "#eec200",
            "tertiary": "#5e5d6a",
            "on-error": "#ffffff",
            "on-primary-fixed": "#231b00",
            "tertiary-fixed-dim": "#c7c5d3",
            "surface-variant": "#ebe1d6",
            "error-container": "#ffdad6",
            "on-background": "#201b14",
            "error": "#ba1a1a",
            "secondary-fixed-dim": "#cfc5ba",
            "surface-container-lowest": "#ffffff",
            "on-tertiary-fixed-variant": "#464652",
            "outline": "#7f7660",
            "surface-container-low": "#fdf2e6",
            "primary-fixed": "#ffe083",
            "on-secondary-container": "#696159",
            "surface": "#fff8f3",
            "tertiary-container": "#d2cfde",
            "secondary-fixed": "#ebe1d6",
            "secondary": "#645d55",
            "on-secondary": "#ffffff",
            "on-surface-variant": "#4d4632",
            "on-tertiary-container": "#595864",
            "inverse-on-surface": "#faefe4",
            "on-primary": "#ffffff",
            "surface-container-highest": "#ebe1d6",
            "on-error-container": "#93000a",
            "surface-bright": "#fff8f3",
            "surface-dim": "#e3d8cd",
            "on-surface": "#201b14",
            "on-tertiary": "#ffffff",
            "on-secondary-fixed-variant": "#4c463e",
            "primary": "#735c00",
            "primary-container": "#facc15"
          },
          borderRadius: {
            DEFAULT: "0px",
            lg: "0px",
            xl: "0px",
            full: "9999px"
          },
          fontFamily: {
            headline: ["Space Grotesk"],
            body: ["Inter"],
            label: ["Space Grotesk"]
          }
        },
      },
    };
  </script>
</body>
</html>
