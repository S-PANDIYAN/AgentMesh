<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AgentMesh Intelligence Hub | PR Review Summary</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .font-headline { font-family: 'Space Grotesk', sans-serif; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  </style>
</head>
<body class="bg-background text-on-background selection:bg-primary-container selection:text-on-primary-fixed">

  <!-- Header & Sidebar injected here -->
  <div id="header-container"></div>
  <div id="sidebar-container"></div>

  <!-- Main Canvas -->
  <main class="ml-64 mt-16 pb-12 min-h-screen">
    <!-- Loading placeholder -->
    <div id="loading" class="flex items-center justify-center h-96">
      <div class="text-center">
        <div class="animate-spin">
          <span class="material-symbols-outlined text-6xl text-primary-container">autorenew</span>
        </div>
        <p class="font-headline text-lg mt-4">Loading analysis...</p>
      </div>
    </div>

    <!-- Results container -->
    <div id="results" class="hidden">
      <!-- PR Header will be inserted here -->
      <section class="bg-surface p-8 pb-12" id="pr-header"></section>
      
      <!-- Bento Grid -->
      <section class="px-8 -mt-6" id="bento-grid"></section>
      
      <!-- Findings Table -->
      <section class="px-8 mt-12" id="findings-table"></section>
      
      <!-- Recommendations -->
      <section class="px-8 mt-16" id="recommendations"></section>
      
      <!-- Action Footer -->
      <footer class="px-8 mt-24" id="action-footer"></footer>
    </div>
  </main>

  <!-- Footer injected here -->
  <div id="footer-container"></div>

  <!-- Scripts -->
  <script src="../js/utils.js"></script>
  <script src="../js/api.js"></script>

  <script>
    // Load components
    async function loadComponent(containerId, componentFileName) {
      try {
        const response = await fetch(`../components/${componentFileName}`);
        const html = await response.text();
        document.getElementById(containerId).innerHTML = html;
      } catch (error) {
        console.error(`Failed to load component:`, error);
      }
    }

    document.addEventListener('DOMContentLoaded', async () => {
      // Load shared components
      await loadComponent('header-container', 'header.html');
      await loadComponent('sidebar-container', 'sidebar.html');
      await loadComponent('footer-container', 'footer.html');

      // Get task ID from URL
      const params = new URLSearchParams(window.location.search);
      const taskId = params.get('task');

      if (!taskId) {
        document.getElementById('loading').innerHTML = '<p class="text-error">No task ID provided</p>';
        return;
      }

      try {
        // Poll for results
        const result = await AgentMeshAPI.pollTaskStatus(taskId);
        
        // Hide loading, show results
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('results').classList.remove('hidden');

        // Render results
        renderPRHeader(result);
        renderBentoGrid(result);
        renderFindings(result);
        renderRecommendations(result);
        renderActionFooter();
      } catch (error) {
        document.getElementById('loading').innerHTML = `<p class="text-error">${error.message}</p>`;
      }
    });

    function renderPRHeader(data) {
      const header = document.getElementById('pr-header');
      const filename = data.payload?.filename || 'Unknown';
      const confidence = ((data.confidence || 0) * 100).toFixed(1);

      header.innerHTML = `
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-end gap-6">
          <div>
            <div class="inline-flex items-center gap-2 bg-primary-container text-on-primary-fixed px-3 py-1 mb-4 font-headline text-[10px] font-black tracking-widest uppercase">
              Active Review Process
            </div>
            <h1 class="text-6xl font-black font-headline tracking-tighter leading-none mb-4 uppercase">
              ${Utils.truncateText(filename, 50)} <span class="text-outline">Review</span>
            </h1>
          </div>
          <div class="flex gap-4">
            <div class="text-right">
              <div class="text-[10px] font-headline font-bold text-primary tracking-widest uppercase mb-1">SWARM CONFIDENCE</div>
              <div class="text-4xl font-black font-headline leading-none">${confidence}%</div>
            </div>
          </div>
        </div>
      `;
    }

    function renderBentoGrid(data) {
      const bento = document.getElementById('bento-grid');
      const criticalCount = (data.agent_responses || []).reduce((acc, r) => acc + (r.findings?.filter(f => f.severity === 'CRITICAL').length || 0), 0);
      const safetyScore = Math.round(data.confidence * 100);

      bento.innerHTML = `
        <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-12 gap-1">
          <!-- Safety Score Card -->
          <div class="md:col-span-4 bg-surface-container-lowest p-8 flex flex-col justify-between min-h-[280px]">
            <div>
              <h2 class="font-headline text-xs font-black tracking-widest uppercase text-primary mb-6">Safety Score</h2>
              <div class="relative w-32 h-32 mx-auto">
                <svg class="w-full h-full transform -rotate-90">
                  <circle class="text-surface-container-highest" cx="64" cy="64" fill="transparent" r="60" stroke="currentColor" stroke-width="12"></circle>
                  <circle class="text-primary-container" cx="64" cy="64" fill="transparent" r="60" stroke="currentColor" stroke-dasharray="${377 * safetyScore / 100}" stroke-dashoffset="68" stroke-width="12"></circle>
                </svg>
                <div class="absolute inset-0 flex items-center justify-center">
                  <span class="text-4xl font-black font-headline">${safetyScore}</span>
                </div>
              </div>
            </div>
          </div>

          <!-- Critical Issues Card -->
          <div class="md:col-span-3 bg-primary-container p-8 flex flex-col justify-between">
            <h2 class="font-headline text-xs font-black tracking-widest uppercase text-on-primary-fixed mb-4">Critical Issues</h2>
            <div class="flex items-baseline gap-2">
              <span class="text-8xl font-black font-headline text-on-primary-fixed leading-none">${String(criticalCount).padStart(2, '0')}</span>
              <span class="material-symbols-outlined text-on-primary-fixed text-4xl" style="font-variation-settings: 'FILL' 1;">warning</span>
            </div>
            <div class="bg-on-primary-fixed text-primary-container px-4 py-2 font-headline text-[10px] font-bold tracking-widest mt-6 uppercase text-center">
              ${criticalCount > 0 ? 'Action Required Immediately' : 'No Critical Issues!'}
            </div>
          </div>

          <!-- Status Image -->
          <div class="md:col-span-5 bg-surface-container overflow-hidden">
            <div class="w-full h-full bg-gradient-to-br from-primary-container/20 to-primary/20 flex items-center justify-center">
              <div class="text-center">
                <span class="material-symbols-outlined text-8xl text-primary-container/30 block">verified</span>
                <p class="text-sm text-on-surface-variant mt-4">Analysis Complete</p>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderFindings(data) {
      const table = document.getElementById('findings-table');
      const agents = data.agent_responses || [];

      const rows = agents.map(agent => `
        <tr class="bg-surface-container-low hover:bg-surface-container transition-colors">
          <td class="px-6 py-6 font-headline font-bold uppercase text-xs tracking-tight">${agent.agent_id}</td>
          <td class="px-6 py-6 text-on-surface-variant italic">
            ${agent.recommendation || 'No recommendation'}
          </td>
          <td class="px-6 py-6 text-center">
            <span class="bg-error/10 text-error px-2 py-1 font-headline font-black text-[10px]">
              ${agent.findings?.length || 0} ISSUES
            </span>
          </td>
          <td class="px-6 py-6">
            <div class="flex items-center gap-2">
              <div class="w-2 h-2 bg-primary-container rounded-full"></div>
              <span class="font-headline font-bold text-[10px] uppercase">
                ${((agent.confidence || 0) * 100).toFixed(0)}% Confidence
              </span>
            </div>
          </td>
        </tr>
      `).join('');

      table.innerHTML = `
        <div class="max-w-6xl mx-auto">
          <div class="flex justify-between items-center mb-6">
            <h2 class="font-headline text-2xl font-black tracking-tight uppercase">Agent Findings</h2>
            <div class="h-[2px] flex-1 mx-8 bg-outline-variant/20"></div>
            <span class="font-headline text-xs font-bold text-on-surface-variant tracking-widest uppercase">DOMAIN_ANALYSIS_V4.0</span>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
              <thead>
                <tr class="bg-surface-container font-headline text-[10px] font-black tracking-widest uppercase text-on-surface-variant">
                  <th class="px-6 py-4">Agent</th>
                  <th class="px-6 py-4">Summary</th>
                  <th class="px-6 py-4 text-center">Issues</th>
                  <th class="px-6 py-4">Confidence</th>
                </tr>
              </thead>
              <tbody class="font-body text-sm">
                ${rows}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function renderRecommendations(data) {
      const recs = document.getElementById('recommendations');
      recs.innerHTML = `
        <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-12">
          <div>
            <h2 class="font-headline text-4xl font-black tracking-tighter uppercase mb-8">Swarm Recommendations</h2>
            <div class="space-y-6">
              ${(data.agent_responses || []).slice(0, 3).map((agent, i) => `
                <div class="group flex gap-6 p-6 bg-surface-container-low border-l-4 border-primary-container hover:bg-surface-container transition-all">
                  <span class="text-4xl font-black font-headline text-outline opacity-30 group-hover:opacity-100 transition-opacity">${String(i+1).padStart(2, '0')}</span>
                  <div>
                    <h3 class="font-headline font-bold text-sm uppercase mb-2">${agent.agent_id}</h3>
                    <p class="text-xs text-on-surface-variant leading-relaxed">
                      ${agent.recommendation || 'Review findings in detail'}
                    </p>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
          <div class="flex flex-col justify-center">
            <div class="bg-on-surface p-10">
              <h3 class="font-headline text-primary-container text-xs font-black tracking-[0.2em] uppercase mb-8">Analysis Metrics</h3>
              <div class="space-y-8">
                <div>
                  <div class="flex justify-between font-headline text-[10px] font-bold text-white uppercase mb-2">
                    <span>Agents Consulted</span>
                    <span class="text-primary-container">${data.agent_responses?.length || 0}/5</span>
                  </div>
                  <div class="h-1 bg-surface-variant/20 overflow-hidden">
                    <div class="h-full bg-primary-container" style="width: ${((data.agent_responses?.length || 0) / 5 * 100)}%"></div>
                  </div>
                </div>
                <div>
                  <div class="flex justify-between font-headline text-[10px] font-bold text-white uppercase mb-2">
                    <span>Confidence Level</span>
                    <span class="text-primary-container">${((data.confidence || 0) * 100).toFixed(0)}%</span>
                  </div>
                  <div class="h-1 bg-surface-variant/20 overflow-hidden">
                    <div class="h-full bg-primary-container" style="width: ${(data.confidence || 0) * 100}%"></div>
                  </div>
                </div>
              </div>
              <div class="mt-12 flex justify-center">
                <span class="font-headline text-[10px] font-black text-white/50 tracking-[0.4em] uppercase">Multi-Agent Analysis</span>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderActionFooter() {
      const footer = document.getElementById('action-footer');
      footer.innerHTML = `
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row gap-4 justify-between items-center py-10 border-t border-outline-variant/10">
          <div class="flex gap-4">
            <button onclick="downloadReport()" class="bg-surface-container-highest px-8 py-4 font-headline text-[10px] font-black tracking-widest uppercase hover:bg-outline-variant/20 transition-all cursor-pointer">
              Export Markdown
            </button>
            <button onclick="location.reload()" class="bg-surface-container-highest px-8 py-4 font-headline text-[10px] font-black tracking-widest uppercase hover:bg-outline-variant/20 transition-all cursor-pointer">
              Request Re-scan
            </button>
          </div>
          <button onclick="Utils?.showNotification('PR Approved!', 'success')" class="w-full md:w-auto bg-primary-container text-[#231b00] px-16 py-5 font-headline text-sm font-black tracking-widest uppercase hover:scale-105 active:scale-95 transition-all cursor-pointer">
            Approve
          </button>
        </div>
      `;
    }

    function downloadReport() {
      Utils?.showNotification('Report downloaded!', 'success');
    }
  </script>
</body>
</html>
