<script>
// Sidebar navigation
document.querySelectorAll('[data-page]').forEach(link => {
  link.addEventListener('click', (e) => {
    e.preventDefault();
    const page = e.currentTarget.dataset.page;
    console.log('Navigating to:', page);
    // Update active link
    document.querySelectorAll('[data-page]').forEach(l => {
      l.parentElement.classList.remove('bg-[#FACC15]', 'text-[#231b00]', 'font-black');
      l.classList.remove('bg-[#FACC15]', 'text-[#231b00]', 'font-black');
    });
    e.currentTarget.parentElement.classList.add('bg-[#FACC15]', 'text-[#231b00]', 'font-black');
    e.currentTarget.classList.add('bg-[#FACC15]', 'text-[#231b00]', 'font-black');
  });
});

// Deploy agent button
document.getElementById('deploy-agent-btn')?.addEventListener('click', () => {
  Utils?.showNotification('Deploy agent dialog opened', 'info');
});
</script>
